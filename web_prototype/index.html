<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンタル回復ウォッチャー</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <nav class="top-nav">
            <h1>今の波</h1>
            <button id="history-btn" class="icon-btn" aria-label="履歴">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 13H5V21H3V13ZM21 17H19V21H21V17ZM15 9H13V21H15V9ZM10.5 4L8 15H10.5V21L16 10H13.5L16 4H10.5Z" fill="currentColor"/>
                </svg>
            </button>
        </nav>

        <main id="main-content">
            <!-- 1. 入力画面（危機文言はここから削除されました） -->
            <section id="input-view" class="view active">
                <div class="prompt-text">
                    <p>いま、どんな感じですか？</p>
                </div>
                
                <div class="input-area">
                    <textarea id="journal-input" placeholder="ただ、書き出してみてください。" rows="6"></textarea>
                </div>

                <div class="action-area">
                    <button id="submit-btn" class="primary-btn" disabled>吐き出す</button>
                </div>
            </section>

            <!-- 2. フィードバック画面（JSによって通常/危機が切り替わります） -->
            <section id="feedback-view" class="view hidden">
                <div class="feedback-card">
                    <div id="fb-empathy" class="fb-section empathy"></div>
                    <div class="divider" id="divider-1"></div>
                    <div id="fb-fact" class="fb-section fact"></div>
                    <div class="divider" id="divider-2"></div>
                    <div id="fb-closing" class="fb-section closing"></div>
                </div>
                
                <div class="action-area">
                    <button id="back-btn" class="secondary-btn">戻る</button>
                </div>
            </section>

            <!-- 3. 履歴画面 -->
            <section id="history-view" class="view hidden">
                <div class="graph-container">
                    <h2>これまでの波</h2>
                    <p class="graph-desc">波はありますが、少しずつ変化しています。</p>
                    <canvas id="waveChart"></canvas>
                </div>
                <div class="history-list"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
